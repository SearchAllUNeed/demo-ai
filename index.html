
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Плавная анимация высоты */
    #input {
      transition: height 0.2s;
    }
  </style>
</head>

<body class="bg-gradient-to-r from-purple-600 to-blue-500 m-0 p-0 h-screen w-screen flex items-center justify-center overflow-hidden">

  <!-- Заголовок -->
  <div class="absolute top-4 left-4 text-white">
    <h1 class="text-4xl font-bold">AI Prototype</h1>
    <p class="text-lg mt-2">Интерфейс работает в mock-режиме</p>
  </div>

  <!-- Поле ввода -->
  <textarea id="input"
    class="w-full min-h-[150px] p-6 border-none rounded-none resize-none focus:outline-none focus:ring-0 text-xl overflow-hidden"
    placeholder="Введите текст здесь...">
  </textarea>

  <!-- Кнопка -->
  <button onclick="send()"
    class="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-black text-white py-3 px-8 rounded-xl hover:bg-gray-800 transition">
    Run Prototype
  </button>

  <!-- Лоадер -->
  <div id="loader" class="hidden absolute bottom-20 left-1/2 transform -translate-x-1/2 text-white">
    Processing input...
  </div>

  <!-- Вывод результата -->
  <pre id="output"
    class="absolute top-32 left-1/2 transform -translate-x-1/2 w-3/4 text-white whitespace-pre-wrap text-lg"></pre>

  <script>
    // Авторасширение textarea
    const textarea = document.getElementById("input");
    textarea.addEventListener("input", autoResize);

    function autoResize() {
      this.style.height = "auto"; // сброс
      this.style.height = this.scrollHeight + "px"; // подгоняем под содержимое
    }

    // Функция отправки (mock)
    async function send() {
      const input = textarea.value;
      const output = document.getElementById("output");
      const loader = document.getElementById("loader");

      output.innerText = "";
      loader.classList.remove("hidden");

      // Имитируем задержку
      await new Promise(r => setTimeout(r, 1200));

      const response = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: input })
      });

      const data = await response.json();
      loader.classList.add("hidden");
      output.innerText = data.result;
    }

    // Инициализируем высоту textarea сразу
    textarea.style.height = textarea.scrollHeight + "px";
  </script>

</body>
</html>
